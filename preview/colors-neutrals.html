<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:10px}
.sw{flex:1;border-radius:8px;padding:12px;min-height:80px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border)}
.sw .n{font-size:12px;font-weight:600}
.sw .h{font-family:var(--font-mono);font-size:10px;color:var(--fg-2)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--bg)"><div class="n">Page BG</div><div class="h">#f0f4fa · --bg</div></div>
  <div class="sw" style="background:var(--surface-2)"><div class="n">Surface-2</div><div class="h">#edf2f8</div></div>
  <div class="sw" style="background:var(--border)"><div class="n">Border</div><div class="h">#c8d6e8</div></div>
  <div class="sw" style="background:var(--fg-2);color:#fff;border-color:var(--fg-2)"><div class="n">Muted</div><div class="h" style="color:var(--border)">#4a6080 · --fg-2</div></div>
  <div class="sw" style="background:var(--crp-navy);color:#fff;border-color:var(--crp-navy)"><div class="n">Text</div><div class="h" style="color:var(--crp-cyan)">#072061 · --fg-1</div></div>
</div>
</body></html>
