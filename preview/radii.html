<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:12px;align-items:flex-end}
.cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.tile{width:60px;height:48px;background:var(--crp-blue)}
.lab{font-family:var(--font-mono);font-size:10px;color:var(--fg-2)}
</style></head><body>
<div class="row">
  <div class="cell"><div class="tile" style="border-radius:4px"></div><div class="lab">xs · 4</div></div>
  <div class="cell"><div class="tile" style="border-radius:6px"></div><div class="lab">sm · 6</div></div>
  <div class="cell"><div class="tile" style="border-radius:8px"></div><div class="lab">md · 8</div></div>
  <div class="cell"><div class="tile" style="border-radius:10px"></div><div class="lab">lg · 10</div></div>
  <div class="cell"><div class="tile" style="border-radius:12px"></div><div class="lab">xl · 12</div></div>
  <div class="cell"><div class="tile" style="border-radius:16px"></div><div class="lab">2xl · 16</div></div>
  <div class="cell"><div class="tile" style="border-radius:999px"></div><div class="lab">pill</div></div>
</div>
</body></html>
