<!doctype html>
<!-- @dsCard group="Components" name="Inputs" subtitle="Text, select, textarea, checkbox, radio" viewport="700x420" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:var(--bg);font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label{display:block;font-size:12px;font-weight:500;color:var(--crp-navy);margin-bottom:5px}
input,select{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;font-family:inherit;box-sizing:border-box}
input:focus{outline:none;border-color:var(--crp-blue);box-shadow:0 0 0 3px rgba(24,67,173,.15)}
.chk{display:flex;align-items:center;gap:10px;margin-top:4px;font-size:13px;color:var(--fg-2)}
.chk input{width:18px;height:18px;accent-color:var(--crp-blue);margin:0}
</style></head><body>
<div class="grid">
  <div><label>First name</label><input value="Maria" /></div>
  <div><label>Phone</label><input value="(215) 555-0199" style="border-color:var(--crp-blue);box-shadow:0 0 0 3px rgba(24,67,173,.15)" /></div>
</div>
<div class="chk" style="margin-top:12px"><input type="checkbox" checked> <span>I consent to be contacted about studies.</span></div>
</body></html>
