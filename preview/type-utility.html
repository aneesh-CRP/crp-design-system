<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;flex-wrap:wrap;gap:18px 28px;align-items:baseline}
.pair{display:flex;align-items:baseline;gap:10px}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
</style></head><body>
<div class="row">
  <div class="pair"><div style="font-size:10px;font-weight:700;color:var(--fg-2);text-transform:uppercase;letter-spacing:.1em">Eyebrow 10/700</div><div class="val">.eyebrow</div></div>
  <div class="pair"><div style="font-size:11px;color:var(--fg-2)">Caption 11</div><div class="val">--fs-xs</div></div>
  <div class="pair"><div style="font-size:13px;color:var(--crp-navy)">Small 13</div><div class="val">--fs-small</div></div>
  <div class="pair"><div style="font-size:15px;color:var(--crp-navy)">Body 15</div><div class="val">--fs-body</div></div>
  <div class="pair"><div style="font-size:18px;font-weight:600;color:var(--crp-navy)">Lead 18</div><div class="val">--fs-h4</div></div>
  <div class="pair"><div style="font-family:var(--font-mono);font-size:13px;color:var(--crp-blue);background:var(--bg);padding:2px 6px;border-radius:4px">code · IBM Plex Mono</div></div>
</div>
</body></html>
