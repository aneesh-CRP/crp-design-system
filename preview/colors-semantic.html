<!doctype html>
<!-- @dsCard group="Colors" name="Colors — Semantic" subtitle="Success, warning, danger" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sw{border-radius:8px;padding:10px 12px;border:1px solid;display:flex;flex-direction:column;gap:4px}
.n{font-size:12px;font-weight:700}
.h{font-family:var(--font-mono);font-size:10px}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;align-self:flex-start}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:var(--success-bg);border-color:var(--success-border);color:var(--success)"><span class="pill" style="background:var(--success);color:#fff">SUCCESS</span><div class="n">Emerald</div><div class="h">#10b981 · --success</div></div>
  <div class="sw" style="background:var(--warning-bg);border-color:var(--warning-border);color:var(--warning)"><span class="pill" style="background:var(--warning);color:#fff">WARNING</span><div class="n">Amber</div><div class="h">#f59e0b · --warning</div></div>
  <div class="sw" style="background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger)"><span class="pill" style="background:var(--danger);color:#fff">DANGER</span><div class="n">Red</div><div class="h">#ef4444 · --danger</div></div>
</div>
</body></html>
