<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 26px;background:#fff;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:auto auto 1fr;column-gap:18px;row-gap:10px;align-items:center;max-width:560px}
.token{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);white-space:nowrap}
.px{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);white-space:nowrap;text-align:right;font-variant-numeric:tabular-nums}
.bar{background:var(--crp-blue);height:14px;border-radius:3px}
.note{font-size:11px;color:var(--fg-2);margin-top:18px;max-width:560px;line-height:1.5}
</style></head><body>
<div class="grid">
  <div class="token">space-1</div><div class="px">4&nbsp;px</div><div><div class="bar" style="width:4px"></div></div>
  <div class="token">space-2</div><div class="px">8&nbsp;px</div><div><div class="bar" style="width:8px"></div></div>
  <div class="token">space-3</div><div class="px">12&nbsp;px</div><div><div class="bar" style="width:12px"></div></div>
  <div class="token">space-4</div><div class="px">16&nbsp;px</div><div><div class="bar" style="width:16px"></div></div>
  <div class="token">space-5</div><div class="px">20&nbsp;px</div><div><div class="bar" style="width:20px"></div></div>
  <div class="token">space-6</div><div class="px">24&nbsp;px</div><div><div class="bar" style="width:24px"></div></div>
  <div class="token">space-8</div><div class="px">32&nbsp;px</div><div><div class="bar" style="width:32px"></div></div>
  <div class="token">space-10</div><div class="px">40&nbsp;px</div><div><div class="bar" style="width:40px"></div></div>
  <div class="token">space-12</div><div class="px">48&nbsp;px</div><div><div class="bar" style="width:48px"></div></div>
  <div class="token">space-16</div><div class="px">64&nbsp;px</div><div><div class="bar" style="width:64px"></div></div>
</div>
<div class="note">4-px base grid. Marketing uses 20–44px paddings; dashboard uses 10–14px for data density.</div>
</body></html>
