<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.stack{display:flex;flex-direction:column;gap:12px}
.card{background:var(--bg);border-radius:10px;padding:18px 20px;position:relative}
.tag{position:absolute;top:10px;right:12px;font-family:var(--font-mono);font-size:10px;color:var(--fg-2)}
</style></head><body>
<div class="stack">
  <div class="card">
    <div class="tag">Area Normal · geometric sans</div>
    <div style="font-size:26px;font-weight:700;color:var(--crp-navy);letter-spacing:-0.01em">Primary: clean, geometric, trustworthy</div>
  </div>
  <div class="card" style="background:var(--orange-bg)">
    <div class="tag" style="color:var(--crp-orange)">Market Pro · handwritten accent</div>
    <div class="script" style="font-size:38px;line-height:1;color:var(--crp-orange)">Made with care in Philadelphia</div>
  </div>
</div>
</body></html>
