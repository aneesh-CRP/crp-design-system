<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:26px;background:var(--bg);font-family:var(--font-sans)}
.row{display:flex;gap:22px;align-items:center}
.card{flex:1;background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center}
.lab{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);margin-top:8px}
.name{font-weight:700;color:var(--crp-navy);font-size:12px}
</style></head><body>
<div class="row">
  <div class="card" style="box-shadow:0 1px 3px rgba(7,32,97,.04)"><div class="name">xs / sm</div><div class="lab">cards at rest · 1px 3px / .04</div></div>
  <div class="card" style="box-shadow:0 2px 12px rgba(26,39,68,.08)"><div class="name">md</div><div class="lab">marketing card · 2px 12px / .08</div></div>
  <div class="card" style="box-shadow:0 4px 16px rgba(7,32,97,.10)"><div class="name">lg</div><div class="lab">hover · 4px 16px / .10</div></div>
  <div class="card" style="box-shadow:0 24px 60px rgba(7,32,97,.18)"><div class="name">xl</div><div class="lab">modal · 24px 60px / .18</div></div>
</div>
</body></html>
