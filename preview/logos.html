<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:14px}
.row2{display:grid;grid-template-columns:1.5fr 1.5fr;gap:14px;margin-top:14px}
.tile{border:1px solid var(--border);border-radius:10px;background:#fff;padding:18px;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:130px;position:relative}
.tile.n{background:var(--crp-navy);border-color:var(--crp-navy)}
.tile.grad{background:var(--gradient-navy-blue);border:none}
.tile img{max-width:100%;display:block}
.tile .long img{max-height:48px}
.tile .stacked img{max-height:120px}
.tile .short img{max-height:96px}
.tile .icon img{max-height:96px}
.label{position:absolute;top:8px;left:12px;font-family:var(--font-mono);font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--fg-2)}
.tile.n .label,.tile.grad .label{color:var(--crp-cyan)}
</style></head><body>
<div class="grid">
  <div class="tile"><span class="label">Long · primary horizontal</span><div class="long"><img src="../assets/logos/crp-long.png" alt="CRP long lockup"></div></div>
  <div class="tile"><span class="label">Stacked</span><div class="stacked"><img src="../assets/logos/crp-stacked.png" alt="CRP stacked lockup"></div></div>
  <div class="tile"><span class="label">Short · CRP + mark</span><div class="short"><img src="../assets/logos/crp-short.png" alt="CRP short"></div></div>
</div>
<div class="row2">
  <div class="tile"><span class="label">Icon only · min 25px wide</span><div class="icon"><img src="../assets/logos/crp-icon.png" alt="CRP icon"></div></div>
  <div class="tile n"><span class="label">White · navy / photo backgrounds</span><div class="long"><img src="../assets/logos/crp-white.png" alt="CRP long, white"></div></div>
</div>
</body></html>
