<!doctype html>
<!-- @dsCard group="Components" name="Cards" subtitle="Default, with header, interactive, risk-top-border" viewport="700x340" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:var(--bg);font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(7,32,97,.04)}
.card-title{font-size:11px;font-weight:700;color:var(--crp-navy);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.kpi{font-size:26px;font-weight:800;color:var(--crp-navy);letter-spacing:-0.02em}
.sub{font-size:11px;color:var(--fg-3);margin-top:3px}
.stripe{border-top:3px solid var(--crp-orange);border-radius:10px 10px 0 0;margin:-14px -14px 14px}
</style></head><body>
<div class="grid">
  <div class="card"><div class="stripe"></div><div class="card-title">Active studies</div><div class="kpi">42</div><div class="sub">+3 this week</div></div>
  <div class="card" style="border-top:3px solid var(--danger)"><div class="card-title">Overdue invoices</div><div class="kpi">$184,320</div><div class="sub">7 accounts · 30+ days</div></div>
</div>
</body></html>
