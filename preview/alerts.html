<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:10px;border:1px solid;display:flex;align-items:center;gap:10px}
.w{background:var(--warning-bg);border-color:var(--warning);color:#92400e}
.d{background:var(--danger-bg);border-color:var(--danger);color:#991b1b}
.i{background:var(--blue-bg);border-color:var(--crp-blue);color:var(--crp-navy)}
.s{background:var(--success-bg);border-color:var(--success);color:#065f46}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style></head><body>
<div class="alert i"><span class="dot" style="background:var(--crp-blue)"></span><b>Heads up.</b>&nbsp;5 coordinators have 80%+ utilization this week.</div>
<div class="alert w"><span class="dot" style="background:var(--warning)"></span><b>Attention needed.</b>&nbsp;3 studies below target enrollment.</div>
<div class="alert d"><span class="dot" style="background:var(--danger)"></span><b>Critical.</b>&nbsp;Invoice #2487 overdue 45+ days — $24,810.</div>
<div class="alert s"><span class="dot" style="background:var(--success)"></span><b>Nice.</b>&nbsp;October collections hit 112% of forecast.</div>
</body></html>
