<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:12px;align-items:stretch}
.sw{flex:1;border-radius:10px;padding:14px 14px 12px;min-height:92px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(0,0,0,.05)}
.sw .n{font-size:13px;font-weight:600;letter-spacing:-0.01em}
.sw .h{font-family:var(--font-mono);font-size:11px;opacity:.8}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--crp-navy);color:#fff"><div class="n">Navy</div><div class="h">#072061</div></div>
  <div class="sw" style="background:var(--crp-blue);color:#fff"><div class="n">Blue</div><div class="h">#1843AD</div></div>
  <div class="sw" style="background:var(--crp-cyan);color:var(--crp-navy)"><div class="n">Cyan</div><div class="h">#A2DCEB</div></div>
  <div class="sw" style="background:var(--crp-orange);color:#fff"><div class="n">Orange</div><div class="h">#FF9933</div></div>
</div>
</body></html>
